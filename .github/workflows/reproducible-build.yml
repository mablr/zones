name: Reproducible Build

# Builds and hashes the byte-deterministic `tempo-zone` binary via the shared
# reusable workflow in tempoxyz/gh-actions.

permissions: {}

concurrency:
  group: reproducible-build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or full SHA) to build reproducibly"
        type: string
        required: false
        default: "main"

jobs:
  build:
    uses: tempoxyz/gh-actions/.github/workflows/reproducible-build.yml@a243d8b1441a34eef885bfecd455597b072e2f2d
    permissions:
      contents: read
    with:
      binary-name: tempo-zone
      ref: ${{ inputs.ref }}
