name: Lint

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  clippy:
    name: clippy
    runs-on: depot-ubuntu-latest-4
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: tempoxyz/gh-actions/actions/setup-rust-build@522daf45baa691955122a3287df2bb2d2cef264f
        with:
          # Pin nightly to avoid breakage from str::as_str() stabilization
          # which breaks shellexpand 3.1.1 method resolution.
          toolchain: nightly-2026-02-21
          components: clippy
      - name: Install Foundry
        uses: tempoxyz/gh-actions/actions/setup-foundry@522daf45baa691955122a3287df2bb2d2cef264f
        with:
          version: nightly
      - name: Build Solidity artifacts
        working-directory: specs/ref-impls
        run: forge build
      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked
        env:
          RUSTFLAGS: -D warnings

  fmt:
    name: fmt
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: tempoxyz/gh-actions/actions/setup-rust-build@522daf45baa691955122a3287df2bb2d2cef264f
        with:
          toolchain: nightly-2026-02-21
          components: rustfmt
          mold: "false"
          sccache: "false"
      - run: cargo fmt --all --check

  typos:
    runs-on: depot-ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  deny:
    permissions:
      contents: read
    uses: tempoxyz/gh-actions/.github/workflows/cargo-deny.yml@522daf45baa691955122a3287df2bb2d2cef264f

  lint-success:
    name: lint success
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    needs:
      - clippy
      - fmt
      - typos
      - deny
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
