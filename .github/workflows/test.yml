name: Test

permissions: {}

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  test:
    name: test
    runs-on: depot-ubuntu-latest-16
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: tempoxyz/gh-actions/actions/setup-rust-build@ea512c23155526b9568598eedfda985755c8246d
        with:
          toolchain: stable
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: nextest@0.9.124
      - name: Install Foundry
        uses: tempoxyz/gh-actions/actions/setup-foundry@ea512c23155526b9568598eedfda985755c8246d
        with:
          version: nightly
      - name: Build Solidity artifacts
        working-directory: specs/ref-impls
        run: forge build
      - name: Build and compile tests
        run: cargo nextest run --profile ci --no-run
      - name: Run tests
        run: cargo nextest run --profile ci

  test-success:
    name: test success
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    needs:
      - test
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
