name: Scan

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions: {}

jobs:
  scan:
    permissions:
      actions: read
      contents: read
    uses: tempoxyz/gh-actions/.github/workflows/scan-github-actions.yml@aa3bffab06ae17963818e139302b186d1f42ec8a
