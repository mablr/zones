name: Scan GitHub Actions

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

permissions: {}

jobs:
  scan:
    permissions:
      actions: read
      contents: read
    uses: tempoxyz/gh-actions/.github/workflows/scan-github-actions.yml@42795cb621272feef9075019c7ecbb27d893678f
