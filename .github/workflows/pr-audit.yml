name: Pull request audit

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

permissions: {}

jobs:
  audit:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: tempoxyz/gh-actions/.github/workflows/pr-audit.yml@f4fa13af0d2e7d194c19b66a0344b9bc597ad1ce
    with:
      environment: pr-audit
    secrets:
      EVENTS_KEY: ${{ secrets.EVENTS_KEY }}
      EVENTS_CERT: ${{ secrets.EVENTS_CERT }}
      EVENTS_ARGS: ${{ secrets.EVENTS_ARGS }}
