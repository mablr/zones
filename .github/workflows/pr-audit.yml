name: Pull request audit

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]

permissions: {}

jobs:
  audit:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: tempoxyz/gh-actions/.github/workflows/pr-audit.yml@656109a25bd988bac138f9dd510a896c5b20ab9a
    with:
      environment: pr-audit
    secrets:
      EVENTS_KEY: ${{ secrets.EVENTS_KEY }}
      EVENTS_CERT: ${{ secrets.EVENTS_CERT }}
      EVENTS_ARGS: ${{ secrets.EVENTS_ARGS }}
