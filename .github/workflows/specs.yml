name: Specs

on:
  push:
    branches: [main, dr/validium]
    paths:
      - "specs/ref-impls/src/**"
      - "specs/ref-impls/test/**"
      - "specs/ref-impls/foundry.toml"
      - "crates/node/**"
      - ".github/workflows/specs.yml"
  merge_group:
  pull_request:
    branches: [main, dr/validium]
    paths:
      - "specs/ref-impls/src/**"
      - "specs/ref-impls/test/**"
      - "specs/ref-impls/foundry.toml"
      - "crates/node/**"
      - ".github/workflows/specs.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Forge Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: nightly

      - name: Show Forge version
        run: forge --version

      - name: Run Forge build
        working-directory: specs/ref-impls
        run: forge build --sizes

  lint:
    name: Forge Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: nightly

      - name: Run Forge fmt check
        working-directory: specs/ref-impls
        run: forge fmt --check src test

  test:
    name: Forge Test & Coverage
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: "sccache"
      MIN_LINES: "88"
      MIN_BRANCHES: "60"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Checkout tempo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: tempoxyz/tempo
          ref: 65185565b01bc9f406a06c522357954d75ce7cb7
          path: tempo
          persist-credentials: false

      - name: Checkout foundry
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: foundry-rs/foundry
          ref: master
          path: foundry
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: foundry

      - name: Patch foundry to use pinned Tempo crates
        run: tempo/scripts/foundry-patch.sh "$GITHUB_WORKSPACE/tempo" "$GITHUB_WORKSPACE/foundry"

      - name: Build Tempo-capable forge
        working-directory: foundry
        run: cargo build --bin forge --profile release --no-default-features

      - name: Install z3 (symbolic solver)
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Run Forge tests (zone-only)
        working-directory: specs/ref-impls
        run: |
          "$GITHUB_WORKSPACE/foundry/target/release/forge" test -vvv --match-path "test/zone/**"

      - name: Run symbolic (symex) property tests
        working-directory: specs/ref-impls
        run: |
          "$GITHUB_WORKSPACE/foundry/target/release/forge" test \
            --symbolic --match-test "check_" \
            --symbolic-solver z3 --symbolic-timeout 180 -vvv

      - name: Forge coverage (zone)
        working-directory: specs/ref-impls
        run: |
          "$GITHUB_WORKSPACE/foundry/target/release/forge" coverage \
            --ir-minimum --match-path "test/zone/**" --exclude-tests --report summary | tee coverage.txt
          {
            echo '### Zone spec coverage'
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage gate (production src/zone)
        working-directory: specs/ref-impls
        run: |
          python3 - <<'PY'
          import os, re, sys
          ln = ld = bn = bd = 0
          for line in open("coverage.txt"):
              if "| src/zone/" in line:
                  c = line.split("|")
                  lm = re.search(r"\((\d+)/(\d+)\)", c[2])
                  bm = re.search(r"\((\d+)/(\d+)\)", c[4])
                  if lm:
                      ln += int(lm.group(1)); ld += int(lm.group(2))
                  if bm:
                      bn += int(bm.group(1)); bd += int(bm.group(2))
          lines = 100 * ln / ld
          branches = 100 * bn / bd
          min_l = float(os.environ["MIN_LINES"])
          min_b = float(os.environ["MIN_BRANCHES"])
          print(f"src/zone: lines={lines:.2f}% (min {min_l}), branches={branches:.2f}% (min {min_b})")
          failed = []
          if lines < min_l:
              failed.append(f"lines {lines:.2f}% < {min_l}%")
          if branches < min_b:
              failed.append(f"branches {branches:.2f}% < {min_b}%")
          if failed:
              sys.exit("Coverage gate failed: " + "; ".join(failed))
          print("Coverage gate passed.")
          PY

  specs-success:
    name: specs success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - lint
      - test
    timeout-minutes: 5
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
