name: Specs

on:
  push:
    branches: [main, dr/validium]
    paths:
      - "specs/ref-impls/src/**"
      - "specs/ref-impls/test/**"
      - "specs/ref-impls/foundry.toml"
      - "crates/tempo-zone/**"
      - ".github/workflows/specs.yml"
  merge_group:
  pull_request:
    branches: [main, dr/validium]
    paths:
      - "specs/ref-impls/src/**"
      - "specs/ref-impls/test/**"
      - "specs/ref-impls/foundry.toml"
      - "crates/tempo-zone/**"
      - ".github/workflows/specs.yml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

jobs:
  build:
    name: Forge Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: nightly

      - name: Show Forge version
        run: forge --version

      - name: Run Forge build
        working-directory: specs/ref-impls
        run: forge build --sizes

  lint:
    name: Forge Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: nightly

      - name: Run Forge fmt check (zone-only)
        working-directory: specs/ref-impls
        run: forge fmt --check src/zone test/zone

  test:
    name: Forge Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          persist-credentials: false

      - name: Checkout tempo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: tempoxyz/tempo
          ref: b78b440950a0fa31b5e55c8a2c81976131e44ba3
          path: tempo
          persist-credentials: false

      - name: Checkout foundry
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: foundry-rs/foundry
          ref: master
          path: foundry
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: foundry

      - name: Patch foundry to use pinned Tempo crates
        run: tempo/scripts/foundry-patch.sh "$GITHUB_WORKSPACE/tempo" "$GITHUB_WORKSPACE/foundry"

      - name: Build Tempo-capable forge
        working-directory: foundry
        run: cargo build --bin forge --profile release --no-default-features

      - name: Run Forge tests (zone-only)
        working-directory: specs/ref-impls
        run: |
          "$GITHUB_WORKSPACE/foundry/target/release/forge" test -vvv --match-path "test/zone/**"

  specs-success:
    name: specs success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - lint
      - test
    timeout-minutes: 5
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
