name: Docker Build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      nightly:
        description: "Tag nightly"
        type: boolean
        default: false
  workflow_call:
  schedule:
    - cron: "5 9 * * *"
    - cron: "30 20 * * *"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/tempoxyz

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: depot-ubuntu-latest-16
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1.7.1

      - name: Docker metadata for tempo-zone
        id: meta-tempo-zone
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/tempo-zone
          bake-target: tempo-zone
          tags: |
            type=schedule,pattern=nightly
            type=raw,value=nightly,enable=${{ github.event.inputs.nightly == 'true' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=stable,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=edge,branch=main
            type=sha,prefix=sha-
            type=ref,event=pr

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: shortsha
        run: echo "shortsha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push Docker images
        uses: depot/bake-action@1d58c2668346981089b088b7ef36755b206b20e9 # v1.13.0
        with:
          files: |
            docker-bake.hcl
            ${{ steps.meta-tempo-zone.outputs.bake-file }}
          targets: default
          project: 0c6tg19qsp
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: ${{ github.event_name != 'merge_group' && github.event_name != 'pull_request' }}
          pull: ${{ github.event_name != 'merge_group' && github.event_name != 'pull_request' }}
        env:
          VERGEN_GIT_SHA: ${{ github.sha }}
          VERGEN_GIT_SHA_SHORT: ${{ steps.shortsha.outputs.shortsha }}
