version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    labels:
      - "A-dependencies"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      cargo-weekly:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - "A-dependencies"
      - "A-ci"
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      actions-weekly:
        applies-to: "version-updates"
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - "A-dependencies"
    commit-message:
      prefix: "chore(docker)"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
